services:
  postgres:
    image: postgres:18-alpine
    container_name: pagasa-postgres
    environment: 
      POSTGRES_DB: pagasa
      POSTGRES_USER: pagasa
      POSTGRES_PASSWORD: pagasa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/

  redis:
    image: redis:8
    container_name: pagasa-redis
    ports:
      - "6379:6379"
    
  backend:
    build: ./backend
    container_name: pagasa-backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: "1.0.0"
      GIT_SHA: "local"
      POSTGRES_DB: pagasa
      POSTGRES_USER: pagasa
      POSTGRES_PASSWORD: pagasa 
      POSTFRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0

  frontend:
    build: ./frontend
    container_name: pagasa-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:

